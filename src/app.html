<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<script>
			// Apply the persisted theme before paint to avoid a flash of the wrong theme.
			// localStorage is the fast-path cache; the settings KV (Task 6) is the durable
			// source of truth and mirrors into here on write.
			(function () {
				try {
					var t = localStorage.getItem('mayon.theme') || 'system';
					var dark =
						t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
					document.documentElement.classList.toggle('dark', dark);
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
