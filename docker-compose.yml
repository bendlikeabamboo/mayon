services:
  web:
    build: .
    ports:
      - '8080:80'
    depends_on: [server]
    restart: unless-stopped
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    expose:
      - '4319'
    volumes:
      - sidecar-data:/data
    restart: unless-stopped
volumes:
  sidecar-data:
