# Production stack — pulls prebuilt images from GHCR.
#
#   docker compose pull && docker compose up -d
#
# To pin a release, set MAYON_VERSION (e.g. 0.1.0) in a local .env or shell:
#   MAYON_VERSION=0.1.0 docker compose up -d
#
# To build the images locally from source instead of pulling, use the override:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml build
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d
services:
  web:
    image: ghcr.io/bendlikeabamboo/mayon:${MAYON_VERSION:-latest}
    ports:
      - '${MAYON_PORT:-8080}:80'
    depends_on: [server]
    restart: unless-stopped
  server:
    image: ghcr.io/bendlikeabamboo/mayon-server:${MAYON_VERSION:-latest}
    expose:
      - '4319'
    volumes:
      - server-data:/data
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-mayon}:${POSTGRES_PASSWORD:-mayon}@db:5432/${POSTGRES_DB:-mayon}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mayon}
      POSTGRES_USER: ${POSTGRES_USER:-mayon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mayon}
    expose:
      - '5432'
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
volumes:
  server-data:
  pg-data:
