name: CI
description: Install deps, lint, type-check, test, build SPA, and verify Docker builds
runs:
  using: composite
  steps:
    - shell: bash
      run: pnpm install --frozen-lockfile
    - shell: bash
      run: pnpm svelte-kit sync
    - shell: bash
      run: pnpm lint
    - shell: bash
      run: pnpm check
    - shell: bash
      run: pnpm test
    - shell: bash
      run: pnpm build
    - shell: bash
      run: docker build .
    - shell: bash
      run: docker build -f server/Dockerfile .
