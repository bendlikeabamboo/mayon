name: Docker Publish

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - uses: ./.github/actions/ci

  verify-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse and verify release version
        id: parse
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          if ! [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' is not 'vX.Y.Z'"
            exit 1
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"
          # All three package.json versions must equal the tag.
          for f in package.json server/package.json packages/shared/package.json; do
            v=$(jq -r .version "$f")
            if [ "$v" != "$tag" ]; then
              echo "::error::$f version '$v' != tag '$tag'"
              exit 1
            fi
          done
          # CHANGELOG must have a matching section.
          if ! grep -Eq "^## \[${tag//./\\.}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${tag}]' section"
            exit 1
          fi
          echo "Release contract satisfied for v${tag}."

  build-and-push:
    needs: [ci, verify-version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - dockerfile: ./Dockerfile
            image: ghcr.io/bendlikeabamboo/mayon
          - dockerfile: server/Dockerfile
            image: ghcr.io/bendlikeabamboo/mayon-server
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-assets:
    needs: [ci, verify-version, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Bake release version into install.sh
        env:
          VERSION: ${{ needs.verify-version.outputs.version }}
        run: |
          mkdir -p out
          sed "s/@MAYON_INSTALLER_VERSION@/${VERSION}/" install.sh > out/install.sh
          chmod +x out/install.sh
          grep -q "MAYON_INSTALLER_VERSION=\"${VERSION}\"" out/install.sh
          cp docker-compose.yml out/docker-compose.yml
      - uses: softprops/action-gh-release@v2
        with:
          name: Mayon ${{ needs.verify-version.outputs.version }}
          files: |
            out/install.sh
            out/docker-compose.yml
          generate_release_notes: true
          fail_on_unmatched_files: true
